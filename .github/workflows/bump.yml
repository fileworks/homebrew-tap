name: bump

on:
  workflow_dispatch:
    inputs:
      formula:
        description: "Formula name (immich-export | paperless-export)"
        required: true
        type: string
      version:
        description: "Strict PyPI release version (for example 1.2.3)"
        required: true
        type: string
      source_repository:
        description: "Exporter repository that published the release"
        required: true
        type: string
      source_run:
        description: "Exporter release workflow run id"
        required: true
        type: string

permissions:
  contents: write
  issues: write

jobs:
  intake:
    runs-on: ubuntu-latest
    outputs:
      issue: ${{ steps.persist.outputs.issue }}
    steps:
      - uses: actions/checkout@v7

      - name: Persist validated request before serialized processing
        id: persist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUEUE_REPOSITORY: ${{ github.repository }}
          FORMULA: ${{ inputs.formula }}
          VERSION: ${{ inputs.version }}
          SOURCE_REPOSITORY: ${{ inputs.source_repository }}
          SOURCE_RUN: ${{ inputs.source_run }}
          INTAKE_RUN: ${{ github.run_id }}
        run: |
          issue="$(
            python3 .github/scripts/formula_queue.py \
              --repository "$QUEUE_REPOSITORY" \
              intake \
              --formula "$FORMULA" \
              --version "$VERSION" \
              --source-repository "$SOURCE_REPOSITORY" \
              --source-run "$SOURCE_RUN" \
              --intake-run "$INTAKE_RUN"
          )"
          printf 'issue=%s\n' "$issue" >> "$GITHUB_OUTPUT"

  drain:
    needs: intake
    runs-on: ubuntu-latest
    concurrency:
      group: formula-bump-drain
      cancel-in-progress: false
    steps:
      # main is protected; the owner PAT is used only for the reviewed commits.
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Drain every durable open request
        env:
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          QUEUE_REPOSITORY: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python3 .github/scripts/formula_queue.py \
            --repository "$QUEUE_REPOSITORY" \
            drain
